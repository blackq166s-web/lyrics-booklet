<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Lyrics Booklet preview">
  <rect width="1200" height="675" fill="#f6efe6"/>
  <circle cx="1040" cy="110" r="145" fill="#ead8c8"/>
  <circle cx="160" cy="590" r="180" fill="#efe2d6"/>
  <g transform="translate(130 80)">
    <rect x="0" y="0" width="270" height="430" rx="10" fill="#111111"/>
    <text x="135" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#c9a45c" letter-spacing="2">COLLECTED LYRICS</text>
    <text x="135" y="202" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#ffffff">Paper</text>
    <text x="135" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#ffffff">Moon</text>
    <rect x="95" y="284" width="80" height="2" fill="#c9a45c"/>
    <text x="135" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#d6d3d1">Example Artist</text>
    <text x="135" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">English / 中文 / 日本語</text>
  </g>
  <g transform="translate(455 80)">
    <rect x="0" y="0" width="270" height="430" rx="10" fill="#fffdf9" stroke="#dfd2c6"/>
    <text x="135" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#a2644a">TRACK 01</text>
    <text x="135" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#211b17">Paper Moon</text>
    <line x1="38" y1="125" x2="232" y2="125" stroke="#a2644a"/>
    <text x="38" y="153" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#a2644a">ENGLISH</text>
    <text x="153" y="153" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#a2644a">中文</text>
    <g font-family="Arial, sans-serif" font-size="12" fill="#34302b">
      <text x="38" y="188" font-style="italic">I folded the night</text>
      <text x="153" y="188">我把夜晚折起</text>
      <text x="38" y="228" font-style="italic">Left it by the window</text>
      <text x="153" y="228">留在窗边</text>
      <text x="38" y="292" font-weight="700" font-style="italic">Hold the light</text>
      <text x="153" y="292" font-weight="700">握住光</text>
    </g>
    <line x1="38" y1="258" x2="232" y2="258" stroke="#a2644a"/>
    <text x="38" y="278" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#a2644a">CHORUS</text>
    <text x="135" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#806f62">2</text>
  </g>
  <g transform="translate(780 80)">
    <rect x="0" y="0" width="270" height="430" rx="10" fill="#fffdf9" stroke="#dfd2c6"/>
    <text x="135" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#a2644a">STACKED MODE</text>
    <text x="135" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#211b17">Afterimage</text>
    <line x1="38" y1="125" x2="232" y2="125" stroke="#a2644a"/>
    <g font-family="Arial, sans-serif" font-size="12" fill="#34302b">
      <text x="38" y="164" font-size="9" font-weight="700" fill="#a2644a">EN</text>
      <text x="66" y="164" font-style="italic">The streetlights tremble</text>
      <text x="38" y="196" font-size="9" font-weight="700" fill="#a2644a">ZH</text>
      <text x="66" y="196">雨后街灯轻轻颤动</text>
      <text x="38" y="228" font-size="9" font-weight="700" fill="#a2644a">JA</text>
      <text x="66" y="228">街灯が揺れる</text>
      <text x="38" y="292" font-size="9" font-weight="700" fill="#a2644a">EN</text>
      <text x="66" y="292" font-style="italic">Your name returns</text>
      <text x="38" y="324" font-size="9" font-weight="700" fill="#a2644a">ZH</text>
      <text x="66" y="324">你的名字回来</text>
    </g>
    <text x="135" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#806f62">3</text>
  </g>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#211b17">Multilingual lyric booklets, typeset with Typst</text>
  <text x="600" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#806f62">Artful presets, bundled fonts, print-ready A4 output</text>
</svg>
